<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>AI Tools Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50">

    <header class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <i class="fas fa-brain text-6xl mb-4"></i>
            <h1 class="text-5xl md:text-6xl font-bold mb-4">AI Tools Directory</h1>
            <p class="text-xl opacity-90 max-w-2xl mx-auto">Discover the best AI tools for every category</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 -mt-6">
        <div class="bg-white rounded-2xl shadow-xl p-4">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="globalSearch"
                    placeholder="Search any AI tool by name, category, or description..."
                    class="w-full pl-12 pr-4 py-4 border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 text-lg">
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8 text-center">Browse by Category</h2>
        <div id="categoriesGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <footer class="bg-gray-800 text-white py-8 mt-12 text-center">
        <p>© 2025 AI Tools Directory | Part of InfoHub Portfolio</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
