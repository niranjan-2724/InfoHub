<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - AI Tools Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50">

    <header id="categoryHeader" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-12">
        <div class="max-w-7xl mx-auto px-4">
            <a href="index.html" class="inline-flex items-center text-white/80 hover:text-white mb-4">
                <i class="fas fa-arrow-left mr-2"></i> Back to Categories
            </a>
            <h1 id="categoryName" class="text-4xl font-bold">Category Name</h1>
            <p id="categoryDesc" class="text-white/80 mt-2">Loading tools...</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="searchTools" placeholder="Search tools in this category..."
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                <select id="subcategoryFilter"
                    class="px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="all">All Subcategories</option>
                </select>
            </div>
            <div class="mt-4 text-gray-600">
                <span id="resultsCount">0</span> tools found
            </div>
        </div>

        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6"></div>
    </div>

    <footer class="bg-gray-800 text-white py-8 mt-12 text-center">
        <p>© 2025 AI Tools Directory | Part of InfoHub Portfolio</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
