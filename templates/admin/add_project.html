<!DOCTYPE html>
<html>

<head>
    <title>Add Project - InfoHub</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="brand"><span>InfoHub</span></div>
        <div class="nav-actions">
            <a href="/admin/dashboard" class="login-link">Dashboard</a>
            <a href="/logout" class="register-btn">Logout</a>
        </div>
    </nav>

    <section class="project-form-page">

        <div class="project-form-card">

            <div class="project-form-head">
                <h1>Add Project</h1>
                <p>Add your latest project details to InfoHub.</p>
            </div>

            <form method="POST">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Project Title *</label>
                        <input type="text" name="title" placeholder="Example: Smart GOV" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" name="category" placeholder="AI, Web Development, Education">
                    </div>

                    <div class="form-group full">
                        <label>Short Description *</label>
                        <textarea name="description" placeholder="Write a short description about your project..."
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" name="image" placeholder="/static/images/project.jpg">
                    </div>

                    <div class="form-group">
                        <label>Technologies *</label>
                        <input type="text" name="tech" placeholder="Python, Flask, MongoDB, HTML, CSS">
                    </div>

                    <div class="form-group">
                        <label>Live Demo Link</label>
                        <input type="text" name="link" placeholder="https://your-project-link.com">
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select name="status">
                            <option value="Live">Live</option>
                            <option value="Development">Development</option>
                            <option value="Coming Soon">Coming Soon</option>
                        </select>
                    </div>

                </div>

                <div class="form-actions">
                    <a href="/admin/dashboard" class="cancel-btn">Cancel</a>
                    <button type="submit">Add Project</button>
                </div>

            </form>

        </div>

    </section>

</body>

</html>
