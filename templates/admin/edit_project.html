<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - InfoHub</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="brand"><span>InfoHub</span></div>
        <div class="nav-actions">
            <a href="/admin/dashboard" class="login-link">Dashboard</a>
            <a href="/logout" class="register-btn">Logout</a>
        </div>
    </nav>

    <section class="project-form-page">

        <div class="project-form-card">

            <div class="project-form-head">
                <h1>Edit Project</h1>
                <p>Update your project details below.</p>
            </div>

            <form method="POST">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Project Title *</label>
                        <input type="text" name="title" value="{{ project.title }}" placeholder="Example: Smart GOV" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" name="category" value="{{ project.category or '' }}" placeholder="AI, Web Development, Education">
                    </div>

                    <div class="form-group full">
                        <label>Short Description *</label>
                        <textarea name="description" placeholder="Write a short description about your project..." required>{{ project.description }}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" name="image" value="{{ project.image }}" placeholder="/static/images/project.jpg">
                    </div>

                    <div class="form-group">
                        <label>Technologies *</label>
                        <input type="text" name="tech" value="{{ project.tech }}" placeholder="Python, Flask, MongoDB, HTML, CSS">
                    </div>

                    <div class="form-group">
                        <label>Live Demo Link</label>
                        <input type="text" name="link" value="{{ project.link }}" placeholder="https://your-project-link.com">
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select name="status">
                            <option value="Live" {% if project.status == 'Live' %}selected{% endif %}>Live</option>
                            <option value="Development" {% if project.status == 'Development' %}selected{% endif %}>Development</option>
                            <option value="Coming Soon" {% if project.status == 'Coming Soon' %}selected{% endif %}>Coming Soon</option>
                        </select>
                    </div>

                </div>

                <div class="form-actions">
                    <a href="/admin/dashboard" class="cancel-btn">Cancel</a>
                    <button type="submit">Update Project</button>
                </div>

            </form>

        </div>

    </section>

</body>

</html>
